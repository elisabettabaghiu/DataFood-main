<header class="navbar">
  <div class="navbar-row">
    <div class="brand" aria-label="DataFood home">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M19.8 4.2C15 3.4 12.4 6 11.1 8.3c-1.4 2.5-1.5 5.4-1.5 6.8V20h2.2v-3.8c1.5-.1 4.7-.6 7-2.7 2.2-2.1 3-5.4 2.4-9.5-.1-.3-.2-.6-.6-.6-.3 0-.6.1-.8.2z" fill="currentColor"/>
      </svg>
      <span>DataFood</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="text"
        class="search"
        placeholder="Cerca prodotti freschi, marca o reparto"
        [(ngModel)]="searchText"
        (input)="onSearchInput()"
      />
    </div>

    <div class="actions">
      <button
        class="cart-icon-button"
        type="button"
        [routerLink]="isOnCartPage ? '/' : '/cart'"
        [attr.aria-label]="isOnCartPage ? 'Torna al catalogo' : 'Carrello (' + cartCount + ' prodotti)'"
      >
        <span class="cart-icon">{{ isOnCartPage ? '⬅' : '🛒' }}</span>
        <span *ngIf="!isOnCartPage && cartCount > 0" class="cart-badge">{{ cartCount }}</span>
      </button>

      <!-- Icona wishlist: se siamo nella wishlist, torna al catalogo -->
      <button
        *ngIf="currentUser"
        class="wishlist-icon-button"
        type="button"
        [routerLink]="isOnWishlistPage ? '/' : '/wishlist'"
        [attr.aria-label]="isOnWishlistPage ? 'Torna al catalogo' : 'Wishlist (' + wishlistCount + ' prodotti)'"
      >
        <span class="wishlist-icon">{{ isOnWishlistPage ? '⬅' : '♡' }}</span>
        <span *ngIf="!isOnWishlistPage && wishlistCount > 0" class="wishlist-badge">{{ wishlistCount }}</span>
      </button>

      <button *ngIf="!currentUser" class="login-button" type="button" routerLink="/login">LOGIN</button>
      <button *ngIf="!currentUser" class="register-button" type="button" routerLink="/register">REGISTER</button>
      <ng-container *ngIf="currentUser as user">
        <div class="user-greeting" aria-label="Utente loggato">
          Ciao {{ user.nome }}
        </div>

        <button
          *ngIf="!logoutConfirmationVisible"
          class="logout-button"
          type="button"
          (click)="requestLogout()"
        >
          Logout
        </button>

        <div *ngIf="logoutConfirmationVisible" class="logout-confirmation" role="status" aria-live="polite">
          <span>Confermi il logout?</span>
          <div class="logout-confirmation-actions">
            <button class="logout-cancel-button" type="button" (click)="cancelLogout()">Annulla</button>
            <button class="logout-confirm-button" type="button" (click)="confirmLogout()">Esci</button>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</header>
